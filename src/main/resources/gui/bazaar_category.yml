# RoyalBazaar - category grid.
# The "0" slots in the mask are the live area: entries from the category config flow in here
# automatically and page themselves. Never edit item slots by hand.
#
# What fills the "0" slots depends on the category:
#   - category declares groups:  -> 'group-content' below renders one icon per group
#                                   (plus any un-grouped items, via 'content')
#   - category has no groups:    -> 'content' below renders the products directly
# Both templates are kept so a server can mix flat and grouped categories freely.

title: "&8Bazaar &7» &f%rbazaar_category%"
command: []
rows: 6

forwards-arrow:
  item: arrow name:"&fNext Page"
  enabled: true
  row: 6
  column: 8

backwards-arrow:
  item: arrow name:"&fPrevious Page"
  enabled: true
  row: 6
  column: 2

# Category rail down the left edge: one icon per category, in the order they load, so a player can
# move between categories without leaving the menu. The icon and name come from each category's
# own config, so adding a category adds a rail entry automatically. Drawn over the mask.
category-rail:
  enabled: true
  column: 1
  rows: [1, 2, 3, 4, 5]
  glint-selected: true
  lore:
    - "&7Click to browse this category."

# Grid layout:
#   The "0" slots below are the live area — entries flow into them in order. Move, shrink or grow that
#   area by editing the pattern; nothing about the layout is fixed in code.
#   To pin a specific entry to a specific square, give it a row/column (or a raw slot) in its own
#   categories/*.yml entry:
#       wheat:
#         item: minecraft:wheat
#         row: 2
#         column: 3
#   Pinned entries hold their square on the first page; everything else fills in around them.

# Menu-level sounds. This plays when the menu opens — including when a button elsewhere opens it.
# So a button that navigates (back, open_menu, open_buy, open_product) must NOT also add play_sound:
# the destination menu already speaks for the click, and two sounds fire as one doubled click.
# Buttons that only re-render the current menu (buy, sell, sell all) DO need their own play_sound,
# because a refresh deliberately does not replay this sound.
sounds:
  open:
    enabled: true
    name: UI_BUTTON_CLICK
    volume: 0.7
    pitch: 1.2

pages:
  - page: 1
    mask:
      items:
        - black_stained_glass_pane
      pattern:
        - "111111111"
        - "110000001"
        - "110000001"
        - "110000001"
        - "110000001"
        - "111111111"

# One icon per group, for categories that declare a groups: block. The summary is live —
# it is recomputed from the group's products every time the menu is drawn.
group-content:
  template:
    item: "%rbazaar_group_icon%"
    name: "%rbazaar_group_name%"
    lore:
      - "&7%rbazaar_group_size% &7products"
      - "&7From &a$%rbazaar_group_min_buy%"
      - "&7Trend: %rbazaar_group_trend% &7(%rbazaar_group_change_24h% 24h)"
      - "&8%rbazaar_group_volume_24h% traded in 24h"
      - ""
      - "&eLeft-click &7to browse."
    left-click:
      - id: open_menu
        args:
          menu: bazaar_group
          category: "%rbazaar_category_id%"
          group: "%rbazaar_group%"

# One entry per bazaar item. Used directly by flat categories, and for any items a grouped
# category left without a group:.
content:
  template:
    item: "%rbazaar_item%"
    name: "%rbazaar_item_display%"
    lore:
      - "&7Buy:  &a$%rbazaar_buy_price%"
      - "&7Sell: &e$%rbazaar_sell_price%"
      - "&7Trend: %rbazaar_trend% &7(%rbazaar_change_24h% 24h)"
      - ""
      - "&eLeft-click &7to open."
    left-click:
      - id: rbazaar_open_product
        args:
          item: "%rbazaar_item%"

slots:
  # Sells your whole inventory. Scope follows how deep you have navigated: anywhere above a group
  # this empties your bags, and only inside a group does it narrow to that group's items.
  - item: chest name:"&6Sell All"
    lore:
      - "&7Sell every item in your inventory"
      - "&7that the bazaar buys."
      - ""
      - "&eClick to sell"
    row: 6
    column: 3
    left-click:
      - id: rbazaar_sell_all
      - id: play_sound
        args:
          sound: ui_button_click
          pitch: 1
          volume: 1
  - item: oak_sign name:"&bSearch"
    lore:
      - "&7Search the bazaar for an item"
      - "&7by name."
      - ""
      - "&eClick to search"
    row: 6
    column: 1
    left-click:
      - id: rbazaar_search

  - item: barrier name:"&cClose"
    lore: []
    row: 6
    column: 5
    left-click:
      - id: close_inventory
