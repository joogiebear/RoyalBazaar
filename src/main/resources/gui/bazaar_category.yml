# RoyalBazaar - category grid.
# The "0" slots in the mask are the live product area: bazaar items from the category
# config flow in here automatically and page themselves. Never edit item slots by hand.

title: "&8Bazaar &7› &f%rbazaar_category%"
command: []
rows: 6

forwards-arrow:
  item: arrow name:"&fNext Page"
  enabled: true
  row: 6
  column: 8

backwards-arrow:
  item: arrow name:"&fPrevious Page"
  enabled: true
  row: 6
  column: 2

pages:
  - page: 1
    mask:
      items:
        - black_stained_glass_pane
      pattern:
        - "111111111"
        - "100000001"
        - "100000001"
        - "100000001"
        - "100000001"
        - "111111111"

# Fills the "0" slots. One entry per bazaar item, sourced from the category config.
content:
  template:
    item: "%rbazaar_item%"
    name: "%rbazaar_item_display%"
    lore:
      - "&7Buy:  &a$%rbazaar_buy_price%"
      - "&7Sell: &e$%rbazaar_sell_price%"
      - "&7Trend: %rbazaar_trend% &7(%rbazaar_change_24h% 24h)"
      - ""
      - "&eLeft-click &7to open."
    left-click:
      - id: rbazaar_open_product
        args:
          item: "%rbazaar_item%"

slots:
  - item: arrow name:"&fBack"
    lore: []
    row: 6
    column: 4
    left-click:
      - id: open_menu
        args:
          menu: bazaar_main
      - id: play_sound
        args:
          sound: ui_button_click
          pitch: 1
          volume: 1

  - item: barrier name:"&cClose"
    lore: []
    row: 6
    column: 5
    left-click:
      - id: close_inventory
