# RoyalBazaar - product page for one item.
# A summary, not a keypad: the item and its live stats, one button per direction. Buying opens the
# instant-buy menu (bazaar_buy.yml) where the quantity is chosen; selling is immediate.
# Since the server is always the counterparty (algorithmic pricing, infinite depth), there are no
# buy/sell orders - just instant buy and instant sell at the live quote.
#
# Click ids: rbazaar_open_buy · rbazaar_sell · rbazaar_back · close_inventory · play_sound

title: "%rbazaar_category_id% &7» &f%rbazaar_item_display%"
command: []
rows: 4

# Menu-level sounds. Per-button feedback still uses play_sound in a click list;
# this covers what a button can't express, like opening the menu.
sounds:
  open:
    enabled: true
    name: UI_BUTTON_CLICK
    volume: 0.7
    pitch: 1.2

pages:
  - page: 1
    mask:
      items:
        - black_stained_glass_pane
      pattern:
        - "111111111"
        - "111111111"
        - "111111111"
        - "111111111"

slots:
  # ---- the item + live stats ----
  - item: "%rbazaar_item% name:\"%rbazaar_item_display%\""
    lore:
      - ""
      - "&7Buy Price:  &a$%rbazaar_buy_price%"
      - "&7Sell Price: &e$%rbazaar_sell_price%"
      - "&7Spread: &f%rbazaar_spread_pct%%"
      - ""
      - "&7Trend: %rbazaar_trend% &7(%rbazaar_change_24h% 24h)"
      - "&7Traded (24h): &f%rbazaar_volume_24h%"
      - ""
      - "&7In your inventory: &f%rbazaar_held_amount%"
    row: 2
    column: 5

  # ---- buy: choose a quantity on the next screen ----
  - item: emerald name:"&aBuy Instantly"
    lore:
      - "&7Buy Price: &a$%rbazaar_buy_price%"
      - ""
      - "&7Choose 1, a stack, a full"
      - "&7inventory, or a custom amount."
      - ""
      - "&eClick to buy"
    row: 2
    column: 3
    left-click:
      - id: rbazaar_open_buy
        args:
          item: "%rbazaar_item%"
      - id: play_sound
        args:
          sound: ui_button_click
          pitch: 1
          volume: 1

  # ---- sell: everything you are carrying, immediately ----
  - item: hopper name:"&eSell Instantly"
    lore:
      - "&7Sell Price: &e$%rbazaar_sell_price%"
      - ""
      - "&7You have: &f%rbazaar_held_amount%"
      - "&7You receive: &e$%rbazaar_sell_value_all%"
      - ""
      - "&eClick to sell all of these"
    row: 2
    column: 7
    left-click:
      - id: rbazaar_sell
        args:
          item: "%rbazaar_item%"
          amount: all
      - id: play_sound
        args:
          sound: ui_button_click
          pitch: 1
          volume: 1

  # ---- nav ----
  - item: arrow name:"&7« Back"
    lore: []
    row: 4
    column: 4
    left-click:
      - id: rbazaar_back
      - id: play_sound
        args:
          sound: ui_button_click
          pitch: 1
          volume: 1

  - item: barrier name:"&cClose"
    lore: []
    row: 4
    column: 6
    left-click:
      - id: close_inventory
