# A bazaar category. The file name (woods_fishes) is the category id.
# 'slot' is its position in the main menu. Items inherit 'defaults' unless they override a field.
#
# Shipped defaults are VANILLA ONLY, so the bazaar works on a fresh server with no other plugins.
# Wood chain: 1 log (4.0) -> 4 planks (1.0 each) -> sticks (0.5 each). Every step is break-even
# BEFORE the spread, so milling logs is never a money printer.

name: "&6Woods & Fishes"
icon: "minecraft:oak_log"
slot: 14

defaults:
  spread: 0.05
  elasticity: 50000
  reversion_rate: 0.02
  floor_pct: 0.4
  ceiling_pct: 3.0

groups:
