# A bazaar category. The file name (mining) is the category id.
# 'slot' is where its icon sits in the category grid. Items inherit 'defaults' unless they override a field.
#
# Shipped defaults are VANILLA ONLY, so the bazaar works on a fresh server with no other plugins.
# Storage blocks are exactly 9x their component; nuggets are 1/9 of their ingot.
# Crafted redstone gear is priced ABOVE the sum of its inputs, so no recipe prints money.

