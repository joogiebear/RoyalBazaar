# A bazaar category. The file name (farming) is the category id.
# 'slot' is its position in the main menu. Items inherit 'defaults' unless they override a field.
#
# Shipped defaults are VANILLA ONLY, so the bazaar works on a fresh server with no other plugins.
# Prices are anchored to: wheat 3, coal 5, iron_ingot 12, gold_ingot 20, redstone 6, lapis 6,
# emerald 60, diamond 120, ancient_debris 700, netherite_ingot 3000.
# Rule of thumb: a crafted item is priced ABOVE the sum of its inputs, so crafting never prints money.

name: "&aFarming"
icon: "minecraft:golden_hoe"
slot: 11

defaults:
  spread: 0.05          # 5% gap between buy and sell (your margin + inflation sink)
  elasticity: 50000     # units to move the price by a factor of e (higher = more stable)
  reversion_rate: 0.02  # fraction pulled back toward base each tick
  floor_pct: 0.4        # price never below 40% of base
  ceiling_pct: 3.0      # price never above 300% of base

