# A bazaar category. The file name (combat) is the category id.
# 'slot' is where its icon sits in the category grid. Items inherit 'defaults' unless they override a field.
#
# Shipped defaults are VANILLA ONLY, so the bazaar works on a fresh server with no other plugins.
# Mob drops are priced by how dangerous/slow the mob is to farm. Gear is priced ABOVE its
# material cost (see mining.yml for the ingot anchors), so smelting loot into armour never pays.

