  # ---------------------------------------------------------------------------
  # OPTIONAL: custom EcoItems entries.
  #
  # Everything above is vanilla, so this file loads clean on any server. The block below
  # is an example of hooking a custom item from the EcoItems plugin into the bazaar.
  #
  # Note the 'ecoitems:' (plural) namespace. Uncomment ONLY if EcoItems is installed AND
  # actually defines an item with that id — otherwise the bazaar logs a warning on every
  # startup and the entry is skipped.
  #
  # 'base_price: auto' instead of a number anchors the item to EcoShop's buy value, so the
  # shop stays the single source of truth; 'npc_floor'/'npc_ceiling' then pin the bazaar's
  # range to the NPC's, which is what stops compression from becoming a money printer.
  #
  # enchanted_ender_pearl:
  #   item: "ecoitems:enchanted_ender_pearl"
  #   group: valuables
  #   base_price: 7200.0     # 160x ender_pearl (45.0) — the usual compression multiplier
  #   ceiling_pct: 4.0       # rare + thin market, so allow a wider swing than the 3.0 default
  #   elasticity: 5000       # a thin market should move faster than a staple's 50000
  #
  # enchanted_diamond:
  #   item: "ecoitems:enchanted_diamond"
  #   base_price: auto       # let EcoShop own the number
  #   npc_floor: true        # bazaar sell can never drop below the NPC's sell price
  #   npc_ceiling: true      # bazaar buy can never rise above the NPC's buy price
  # ---------------------------------------------------------------------------
