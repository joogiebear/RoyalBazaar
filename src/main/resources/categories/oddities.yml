# A bazaar category. The file name (oddities) is the category id.
# 'slot' is its position in the main menu. Items inherit 'defaults' unless they override a field.
#
# Shipped defaults are VANILLA ONLY, so the bazaar works on a fresh server with no other plugins.
# This is the tail of the economy: end/nether goods, brewing glassware, amethyst, deep dark,
# archaeology and the genuinely rare drops. Rare items get a higher ceiling_pct and a lower
# elasticity, so a thin market is allowed to move — that is the point of a rare.

name: "&dOddities"
icon: "minecraft:ender_pearl"
slot: 15

defaults:
  spread: 0.05
  elasticity: 50000
  reversion_rate: 0.02
  floor_pct: 0.4
  ceiling_pct: 3.0

groups:
